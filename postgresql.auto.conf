# Do not edit this file manually!
# It will be overwritten by the ALTER SYSTEM command.
#
# Here below are the settings I use for PostgreSQL engine V17.
# Those settings are for a server having 32Gb RAM.
#
listen_addresses = '*'
port = 5432
max_connections = 104
superuser_reserved_connections = 3
password_encryption = scram-sha-256
shared_buffers = 12GB
work_mem = '32MB'
effective_io_concurrency = 16
wal_level = replica
wal_log_hints = on
wal_writer_delay = 400ms
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9
max_wal_senders = 10
max_replication_slots = 10
track_commit_timestamp = on
track_counts = 'on'
effective_cache_size = 24GB
idle_in_transaction_session_timeout = '5min'
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = '0'
log_min_duration_statement = '500ms'
log_line_prefix = '%m [pid=%p]: [sid=%c/tid=%x] client=%h,user=%u,db=%d,app=%a,line=%l '
log_timezone = 'Europe/Paris'
autovacuum = on
timezone = 'Europe/Paris'
max_worker_processes = 40
shared_preload_libraries = 'pg_cron,anon'
cron.database_name = 'postgres'
cron.use_background_workers = 'on'
cron.timezone = 'Europe/Paris'
cron.max_running_jobs = '32'

